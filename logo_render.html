<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logo Render</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: transparent;
        }

        svg {
            shape-rendering: geometricPrecision;
            text-rendering: geometricPrecision;
        }
    </style>
</head>

<body class="flex items-center justify-center min-h-screen">

    <div id="logo-capture" class="inline-flex items-center justify-center p-20">

        <!-- FINAL POLISHED VERSION -->
        <svg width="350" height="350" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- 1. Rich Deep Gradient -->
                <linearGradient id="mainGradient" x1="256" y1="20" x2="256" y2="500" gradientUnits="userSpaceOnUse">
                    <stop offset="0" stop-color="#3b82f6" /> <!-- Bright Blue Top -->
                    <stop offset="1" stop-color="#172554" /> <!-- Deep Navy Bottom -->
                </linearGradient>

                <!-- 2. Gloss Reflection Gradient -->
                <linearGradient id="glossGradient" x1="256" y1="30" x2="256" y2="250" gradientUnits="userSpaceOnUse">
                    <stop offset="0" stop-color="white" stop-opacity="0.15" />
                    <stop offset="1" stop-color="white" stop-opacity="0" />
                </linearGradient>

                <!-- 3. Soft Shadow -->
                <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
                    <feGaussianBlur in="SourceAlpha" stdDeviation="12" />
                    <feOffset dx="0" dy="20" />
                    <feComponentTransfer>
                        <feFuncA type="linear" slope="0.3" />
                    </feComponentTransfer>
                    <feMerge>
                        <feMergeNode />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>

            <!-- MAIN SHAPE: Rounded Hexagon -->
            <g filter="url(#shadow)">
                <path d="M256 32 
                         L436.4 128.2 
                         Q468.4 145.3 468.4 181.5 
                         L468.4 330.5 
                         Q468.4 366.7 436.4 383.8 
                         L256 480 
                         L75.6 383.8 
                         Q43.6 366.7 43.6 330.5 
                         L43.6 181.5 
                         Q43.6 145.3 75.6 128.2 
                         Z" fill="url(#mainGradient)" />

                <!-- Fine Inner Bevel (Top) -->
                <path d="M256 36 
                         L433 130 
                         Q464 147 464 182 
                         L464 330 
                         Q464 365 433 382 
                         L256 476 
                         L79 382 
                         Q48 365 48 330 
                         L48 182 
                         Q48 147 79 130 
                         Z" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="2" />

                <!-- Gloss Overlay (Top half) -->
                <path d="M256 32 
                         L436.4 128.2 
                         Q468.4 145.3 468.4 181.5 
                         L468.4 256 
                         L43.6 256 
                         L43.6 181.5 
                         Q43.6 145.3 75.6 128.2 
                         Z" fill="url(#glossGradient)" style="mix-blend-mode: overlay;" />
            </g>

            <!-- SYMBOL: Central Intelligence Core (Perfectly Centered) -->
            <g transform="translate(256, 256)">

                <!-- Pulse/Glow Background -->
                <circle r="85" fill="#22D3EE" fill-opacity="0.15" />
                <circle r="65" fill="#0EA5E9" fill-opacity="0.1" />

                <!-- The Monogram: "M" wrapped in a hexagon -->
                <!-- Sharper, thinner lines for 'premium' feel -->
                <path d="M0 -36 L-32 -18 V18 L0 36 L32 18 V-18 Z" fill="none" stroke="white" stroke-width="6"
                    stroke-linejoin="round" stroke-linecap="round" />

                <circle r="10" fill="white" /> <!-- The Brain / Core Node -->

                <!-- Subtle tech details -->
                <rect x="-42" y="-2" width="10" height="4" rx="2" fill="white" fill-opacity="0.3" />
                <rect x="32" y="-2" width="10" height="4" rx="2" fill="white" fill-opacity="0.3" />
            </g>
        </svg>

    </div>

</body>

</html>
