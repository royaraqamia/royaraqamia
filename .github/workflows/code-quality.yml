name: 'Super-Linter'

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Enforce least privilege access for security hardening
permissions:
  contents: read
  statuses: write

jobs:
  lint:
    name: Lint Code Base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          # Super-linter needs full git history to accurately scan PR diffs
          fetch-depth: 0

      - name: Super-Linter
        uses: super-linter/super-linter@v8.7.0
        env:
          VALIDATE_ALL_CODEBASE: true
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Toggle these layout flags to enforce language-specific architecture rules
          VALIDATE_YAML: true

      - name: Setup Build Environment
        uses: ./.github/actions/setup-environment
        with:
          node-version: '24'

      - name: Next.js Lint
        run: npm run lint
